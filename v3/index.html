      p.book-author{ text-align: center; color: #9E9589; font-size: 11pt; margin: 0 0 0.2cm; }
      p.book-count { text-align: center; color: #C1633A; font-size: 10pt; }
      hr.divider   { border: none; border-top: 1px solid #D5CBB8; margin: 0.5cm 0; }
      .toc-title   { font-size: 18pt; font-weight: bold; margin-bottom: 0.4cm; page-break-before: always; }
      .toc-item    { font-size: 11pt; color: #1E1A16; margin: 2px 0; }
      .section-divider { page-break-before: always; background: #1E1A16; padding: 3cm 1cm; text-align: center; }
      .section-divider h1 { color: #F7F3EE; font-size: 24pt; margin: 0; }
      .recipe-page { page-break-before: always; }
      .recipe-header { border-bottom: 2.5pt solid #C1633A; padding-bottom: 6pt; margin-bottom: 10pt; }
      .recipe-eyebrow { font-size: 8pt; letter-spacing: 2px; text-transform: uppercase; color: #9E9589; font-family: monospace; margin-bottom: 4pt; }
      h1.recipe-title { font-size: 22pt; margin: 0 0 4pt; letter-spacing: -0.5px; color: #1E1A16; }
      p.recipe-desc  { font-style: italic; color: #6B6358; margin: 0 0 4pt; font-size: 10.5pt; }
      .recipe-meta   { font-size: 8.5pt; color: #9E9589; font-family: monospace; letter-spacing: 1px; }
      table.recipe-body { width: 100%; border-collapse: collapse; margin-top: 14pt; }
      table.recipe-body td { vertical-align: top; padding: 0; }
      td.ing-col { width: 38%; padding-right: 20pt; }
      td.method-col { width: 62%; }
      h3.col-head { font-size: 8pt; letter-spacing: 2px; text-transform: uppercase; color: #C1633A; font-family: monospace; border-bottom: 0.75pt solid #D5CBB8; padding-bottom: 3pt; margin: 0 0 8pt; }
      ul.ing-list { margin: 0; padding-left: 12pt; }
      ul.ing-list li { font-size: 10pt; margin-bottom: 4pt; color: #3A3530; }
      ol.step-list { margin: 0; padding-left: 14pt; }
      ol.step-list li { font-size: 10pt; margin-bottom: 8pt; color: #3A3530; line-height: 1.55; }
      .notes-box { background: #F7F3EE; border-left: 3pt solid #C1633A; padding: 8pt 10pt; margin-top: 14pt; font-size: 9.5pt; font-style: italic; color: #6B6358; }
      .notes-box b { color: #C1633A; font-style: normal; font-size: 8pt; letter-spacing: 1.5px; text-transform: uppercase; display: block; margin-bottom: 4pt; font-family: monospace; }
    `;

    let body = '';

    // Cover
    body += `<h1 class="book-title">${bs.title||'My Recipe Collection'}</h1>`;
    if (bs.subtitle) body += `<h2 class="book-sub">${bs.subtitle}</h2>`;
    if (bs.author)   body += `<p class="book-author">${bs.author}</p>`;
    body += `<p class="book-count">${recs.length} Recipe${recs.length!==1?'s':''}</p>`;

    // Intro
    if (bs.intro) {
      body += `<h2 class="toc-title" style="margin-top:0;">Introduction</h2>`;
      body += `<p style="font-style:italic;color:#6B6358;">${bs.intro}</p>`;
    }

    // Table of contents
    body += `<h2 class="toc-title">Contents</h2><hr class="divider">`;
    sorted.forEach(r => { body += `<p class="toc-item">— ${r.title}</p>`; });

    // Recipes
    sorted.forEach(r => {
      const g = getGroup(r);
      const c = cat(r.category);

      // Section divider page
      if (bs.groupBy !== 'alphabetical' && g !== lg) {
        body += `<div class="section-divider"><h1>${g}</h1></div>`;
        lg = g;
      }

      const eyebrow = [c?.name, r.course, r.difficulty].filter(Boolean).join(' · ');

        r.prepTime && 'Prep: ' + r.prepTime,
        r.cookTime && 'Cook: ' + r.cookTime,
        r.totalTime && 'Total: ' + r.totalTime,
        r.servings && 'Serves ' + r.servings,
      ].filter(Boolean).join('  ·  ');

      body += `<div class="recipe-page">`;
      body += `<div class="recipe-header">`;
      if (eyebrow) body += `<div class="recipe-eyebrow">${eyebrow}</div>`;
      body += `<h1 class="recipe-title">${r.title}</h1>`;
      if (r.description) body += `<p class="recipe-desc">${r.description}</p>`;
      if (meta) body += `<div class="recipe-meta">${meta}</div>`;
      body += `</div>`;

      // Two-column ingredients + method table
      const hasIngs = r.ingredients?.length > 0;
      const hasSteps = r.steps?.length > 0;
      if (hasIngs || hasSteps) {
        body += `<table class="recipe-body"><tr>`;
        body += `<td class="ing-col">`;
        if (hasIngs) {
          body += `<h3 class="col-head">Ingredients</h3>`;
          body += `<ul class="ing-list">`;
          r.ingredients.forEach(i => body += `<li>${i}</li>`);
          body += `</ul>`;
        }
        body += `</td>`;
        body += `<td class="method-col">`;
        if (hasSteps) {
          body += `<h3 class="col-head">Method</h3>`;
          body += `<ol class="step-list">`;
          r.steps.forEach(s => body += `<li>${s}</li>`);
          body += `</ol>`;
        }
        body += `</td></tr></table>`;
      }

      if (bs.notes && r.notes) {
        body += `<div class="notes-box"><b>Notes</b>${r.notes}</div>`;
      }
      body += `</div>`;
    });

    const html = `<!DOCTYPE html>
<html xmlns:o="urn:schemas-microsoft-com:office:office"
      xmlns:w="urn:schemas-microsoft-com:office:word"
      xmlns="http://www.w3.org/TR/REC-html40">
<head>
<meta charset="utf-8">
<title>${bs.title||'Recipes'}</title>
<!--[if gte mso 9]>
<xml><w:WordDocument><w:View>Print</w:View><w:Zoom>100</w:Zoom></w:WordDocument></xml>
<![endif]-->
<style>${style}</style>
</head>
<body>${body}</body>
</html>`;

    const blob = new Blob(['\ufeff', html], {type:'application/msword'});
    const a = Object.assign(document.createElement('a'), {
      href: URL.createObjectURL(blob),
      download: (bs.title||'recipes').replace(/[^a-z0-9]/gi,'_').toLowerCase()+'.doc'
    });
    a.click(); URL.revokeObjectURL(a.href);
    hideLoading(); toast('Word document downloaded ✓','ok');
  }, 80);
}

function importJSON(input) {
  const f=input.files[0];if(!f)return;
  const fr=new FileReader();
  fr.onload=e=>{
    try{
      const d=JSON.parse(e.target.result);
      if(!d.recipes) throw 0;
      if(confirm(`Import ${d.recipes.length} recipes?`)){
        const ex=new Set(db.recipes.map(r=>r.id));
        d.recipes.forEach(r=>{if(!ex.has(r.id))db.recipes.push(r);});save();
        showPage('browse');toast('Imported '+d.recipes.length+' recipes','ok');
      }
    }catch{toast('Invalid file','err');}
  };
  fr.readAsText(f);
}
